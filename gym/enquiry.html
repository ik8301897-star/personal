<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Enquiry</title>

<link rel="stylesheet" href="./enquiry.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="./mediaenquiry.css">

</head>

<body>
     <header>
    <div class="logo">
       <img src="./logogym.png" alt="">
    </div>
    <div class="menu-icon" id="menuIcon">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav id="navMenu">
        <a href="./index.html" class="navbar">Home</a>
        <a href="./about.html" class="navbar">About</a>
        <a href="./service.html" class="navbar">Services</a>
        <a href="./result.html" class="navbar">Results That Speak</a>
          <a href="./enquiry.html" class="navbar">Enquiry</a>

        <button class="mobile-btn">
           Enquiry <i class="fa-solid fa-arrow-right" id="righticon"></i>
        </button>
    </nav>


    <div class="button">
        <button>
            Enquiry<i class="fa-solid fa-arrow-right" id="righticon"></i>
        </button>
    </div>

</header>

<section class="enquiry">

    <div class="enquiry-container">

   
        <div class="enquiry-info">
            <h1>Start Your Transformation Today</h1>
            <p>
                Fill the enquiry form and our fitness expert will contact you
                with a personalized training plan designed for your goals.
            </p>

            <div class="info-box">
                <p><i class="fa-solid fa-phone"></i> +91 9708843250</p>
                <p><i class="fa-solid fa-location-dot"></i> Patna, Bihar</p>
                <p><i class="fa-solid fa-clock"></i> Mon–Sat : 6AM – 10PM</p>
            </div>
        </div>

        <div class="enquiry-form">
            <h2>Enquiry Form</h2>

            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="email" placeholder="Email Address">

                <select required>
                    <option value="">Select Goal</option>
                    <option>Weight Loss</option>
                    <option>Muscle Gain</option>
                    <option>Personal Training</option>
                    <option>General Fitness</option>
                </select>

                <textarea placeholder="Your Message"></textarea>

                <button type="submit">Submit Enquiry</button>
            </form>
        </div>

    </div>

</section>

    <script>
 
const menuIcon = document.getElementById("menuIcon");
const navMenu = document.getElementById("navMenu");
const icon = menuIcon.querySelector("i");

menuIcon.addEventListener("click", () => {

    navMenu.classList.toggle("active");

    if(navMenu.classList.contains("active")){
        icon.classList.replace("fa-bars","fa-xmark");
    }else{
        icon.classList.replace("fa-xmark","fa-bars");
    }
});
</script>
</body>
</html>
