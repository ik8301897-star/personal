<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image slider just like nike</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
</head>
<body>
   <section class="hero">

    <!-- <video class="hero-video"></video> -->
     <img src="https://images.pexels.com/photos/16304368/pexels-photo-16304368.jpeg" alt="" class="hero-img">

    <div class="overlay">
        <div class="content-overlay">

        <h1>FULL HORSEPOWER</h1>

        <p>for england belief, doesnt blink</p>

        <div class="hero-buttons">

            <button id="shop-button">Shop</button>

            <button id="watch-button">Watch <i class="fa-solid fa-play"></i></button>

        </div>
        </div>

    </div>

    <div class="dots">

       <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>

    </div>

    <div class="controls">

       <i class="fa-solid fa-pause" id="pauseBtn" ></i>
       <i class="fa-solid fa-chevron-left" id="prevBtn"></i>
      <i class="fa-solid fa-chevron-right" id="nextBtn"></i>

    </div>

</section>
    

    <script src="./app.js"></script>
</body>
</html>
