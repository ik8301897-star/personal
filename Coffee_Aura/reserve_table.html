<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reserve_table_.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

</head>

<body>
    <!-- A SANCTUARY FOR YOUR SENSES -->

    <div class="lounge-experience">
        <div class="lounge-overlay"></div>

        <div class="lounge-table">
            <h1>Reserve the Table</h1>
            <div class="input-group">
                <i class="fa-solid fa-mug-hot"></i>
                <input type="text" placeholder="Full Name" required class="form-input">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="number" min="1" max="9" placeholder="Phone Number" required class="form-input">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-utensils"></i>
                <input type="number" min="1" max="6" placeholder="Number of guest" required class="form-input">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="datetime-local" placeholder="Date" required class="form-input">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="time" placeholder="time" required class="form-input">
            </div>

            <div class="button"><button>Book Now</button>
            </div>



        </div>
      <a href="./index.html"> <div class="closebutton">
            <i class="fa-solid fa-xmark" id="close-icon"></i>
        </div> </a>

    </div>


</body>

</html>
